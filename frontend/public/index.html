<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>AM4 Calc</title>
</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-8 text-blue-400">AM4 Calculator</h1>

        <div id="error-msg" class="text-red-400 text-sm text-center mb-4 hidden font-bold">
            ⚠️ One or more values exceed 6000!
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div class="flex flex-col gap-4">
                <span class="text-center text-xs font-bold uppercase text-slate-400">Plane Seats</span>
                <input type="number" id="plane_eco" class="calc-input bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-center text-xl focus:border-blue-500 outline-none" placeholder="Eco">
                <input type="number" id="plane_business" class="calc-input bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-center text-xl focus:border-blue-500 outline-none" placeholder="Bus">
                <input type="number" id="plane_first" class="calc-input bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-center text-xl focus:border-blue-500 outline-none" placeholder="First">
            </div>

            <div class="flex flex-col gap-4">
                <span class="text-center text-xs font-bold uppercase text-slate-400">Market Demand</span>
                <input type="number" id="demand_eco" class="calc-input bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-center text-xl focus:border-blue-500 outline-none" placeholder="Eco">
                <input type="number" id="demand_business" class="calc-input bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-center text-xl focus:border-blue-500 outline-none" placeholder="Bus">
                <input type="number" id="demand_first" class="calc-input bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-center text-xl focus:border-blue-500 outline-none" placeholder="First">
            </div>
        </div>

        <button id="sendBtn" class="w-full mt-10 bg-blue-600 disabled:bg-slate-700 disabled:text-slate-500 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl shadow-lg transition-all uppercase tracking-wider">
            Calculate Now
        </button>

        <div id="results-card" class="mt-8 bg-slate-700/50 p-6 rounded-2xl border border-blue-500/30 hidden">
            <h3 class="text-blue-400 font-bold text-center mb-4 uppercase tracking-wider">Calculated Configuration</h3>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div>
                    <div class="text-[10px] text-slate-400 uppercase">Economy</div>
                    <div id="res-economy" class="text-xl font-bold text-white">-</div>
                </div>
                <div>
                    <div class="text-[10px] text-slate-400 uppercase">Business</div>
                    <div id="res-business" class="text-xl font-bold text-white">-</div>
                </div>
                <div>
                    <div class="text-[10px] text-slate-400 uppercase">First</div>
                    <div id="res-first" class="text-xl font-bold text-white">-</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/calculate.js"></script>
</body>

</html>
